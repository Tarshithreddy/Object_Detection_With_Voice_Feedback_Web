<!DOCTYPE html>
<html>
<head>
    <title>YOLO Browser AI</title>

    <style>
        body {
            text-align: center;
            font-family: Arial;
            background: #f5f5f5;
        }

        h2 {
            margin-top: 20px;
        }

        video {
            display: block;
            margin: auto;
            width: 400px;
            border-radius: 10px;
        }

        img {
            display: block;
            margin: auto;
            width: 500px;
            margin-top: 10px;
            border-radius: 10px;
        }

        button {
            padding: 10px 20px;
            margin: 10px;
            border: none;
            background: #007bff;
            color: white;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background: #0056b3;
        }

        #text {
            font-size: 18px;
            margin-top: 10px;
            font-weight: bold;
        }
    </style>
</head>

<body>

    <h2>YOLO Object Detection (Browser AI)</h2>

    <button onclick="startCam()">Start Camera</button>
    <button onclick="stopCam()">Stop Camera</button>

    <video id="video" autoplay></video>
    <canvas id="canvas" style="display:none;"></canvas>

    <p id="text">Detection will appear here</p>

    <img id="output"/>

<script>

let streaming = false;

const video = document.getElementById("video");
const canvas = document.getElementById("canvas");
const output = document.getElementById("output");
const text = document.getElementById("text");

// browser camera
navigator.mediaDevices.getUserMedia({ video: true })
.then(stream => {
    video.srcObject = stream;
});

function startCam() {
    streaming = true;
}

function stopCam() {
    streaming = false;
}

function sendFrame() {
    if (!streaming) return;

    const ctx = canvas.getContext("2d");
    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;

    ctx.drawImage(video, 0, 0);

    let image = canvas.toDataURL("image/jpeg");

    fetch("/detect", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({ image: image })
    })
    .then(res => res.json())
    .then(res => {
        if (res.image) {
            output.src = "data:image/jpeg;base64," + res.image;
        }
        text.innerText = res.text;
    });
}

setInterval(sendFrame, 300);

</script>

</body>
</html>
