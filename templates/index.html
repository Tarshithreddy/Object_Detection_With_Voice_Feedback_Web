<!DOCTYPE html>
<html>
<head>
    <title>YOLO AI System</title>
</head>

<body>
    <h2>YOLO Browser Detection</h2>

    <button onclick="startCam()">Start Camera</button>
    <button onclick="stopCam()">Stop Camera</button>

    <br><br>

    <video id="video" autoplay></video>
    <canvas id="canvas" style="display:none;"></canvas>

    <h3 id="text"></h3>
    <img id="output" width="500"/>

<script>
let streaming = false;

const video = document.getElementById("video");
const canvas = document.getElementById("canvas");
const output = document.getElementById("output");
const text = document.getElementById("text");

navigator.mediaDevices.getUserMedia({ video: true })
.then(stream => {
    video.srcObject = stream;
});

function startCam() {
    fetch("/start");
    streaming = true;
}

function stopCam() {
    fetch("/stop");
    streaming = false;
}

function sendFrame() {
    if (!streaming) return;

    const ctx = canvas.getContext("2d");
    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;

    ctx.drawImage(video, 0, 0);

    let data = canvas.toDataURL("image/jpeg");

    fetch("/detect", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({ image: data })
    })
    .then(res => res.json())
    .then(res => {
        if (res.image) {
            output.src = "data:image/jpeg;base64," + res.image;
        }
        text.innerText = res.text;
    });
}

setInterval(sendFrame, 300);
</script>

</body>
</html>
