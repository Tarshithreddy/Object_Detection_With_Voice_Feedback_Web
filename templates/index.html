<!DOCTYPE html>
<html>
<head>
    <title>YOLO AI System</title>

    <style>
        body {
            text-align: center;
            font-family: Arial;
            background: #f2f2f2;
        }

        video, img {
            display: block;
            margin: auto;
            border-radius: 10px;
        }

        video {
            width: 400px;
        }

        img {
            width: 500px;
            margin-top: 10px;
        }

        button {
            padding: 10px 20px;
            margin: 10px;
            background: blue;
            color: white;
            border: none;
            cursor: pointer;
            border-radius: 5px;
        }

        #text {
            font-size: 18px;
            font-weight: bold;
            margin-top: 10px;
        }
    </style>
</head>

<body>

<h2>YOLO Object Detection</h2>

<button onclick="start()">Start Camera</button>
<button onclick="stop()">Stop Camera</button>

<video id="video" autoplay></video>
<canvas id="canvas" style="display:none;"></canvas>

<p id="text">Waiting...</p>

<img id="output"/>

<script>

let running = false;

const video = document.getElementById("video");
const canvas = document.getElementById("canvas");
const output = document.getElementById("output");
const text = document.getElementById("text");

// camera
navigator.mediaDevices.getUserMedia({ video: true })
.then(stream => video.srcObject = stream);

function start() {
    running = true;
}

function stop() {
    running = false;
}

function sendFrame() {
    if (!running) return;

    const ctx = canvas.getContext("2d");
    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;

    ctx.drawImage(video, 0, 0);

    const image = canvas.toDataURL("image/jpeg");

    fetch("/detect", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({ image })
    })
    .then(res => res.json())
    .then(data => {
        output.src = "data:image/jpeg;base64," + data.image;
        text.innerText = data.text || "No detection";
    });
}

setInterval(sendFrame, 400);

</script>

</body>
</html>
